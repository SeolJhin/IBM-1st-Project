apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-etcd
  labels:
    app: milvus-etcd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-etcd
  template:
    metadata:
      labels:
        app: milvus-etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.5
          imagePullPolicy: IfNotPresent
          command:
            - etcd
            - -advertise-client-urls=http://milvus-etcd:2379
            - -listen-client-urls=http://0.0.0.0:2379
            - --data-dir=/etcd
          env:
            - name: ETCD_AUTO_COMPACTION_MODE
              value: revision
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1000"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "4294967296"
            - name: ETCD_SNAPSHOT_COUNT
              value: "50000"
          ports:
            - containerPort: 2379
          volumeMounts:
            - name: etcd-data
              mountPath: /etcd
      volumes:
        - name: etcd-data
          persistentVolumeClaim:
            claimName: milvus-etcd-pvc
