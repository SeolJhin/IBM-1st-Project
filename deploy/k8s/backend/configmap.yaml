apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  SERVER_SERVLET_CONTEXT_PATH: "/api"
  SERVER_FORWARD_HEADERS_STRATEGY: "framework"
  APP_OAUTH2_REDIRECT_URI: "https://uniplace.site/oauth2/success"
  APP_CORS_ALLOWED_ORIGINS: "https://uniplace.site"
  KAKAO_REDIRECT_URI: "https://uniplace.site/api/login/oauth2/code/kakao"
  GOOGLE_REDIRECT_URI: "https://uniplace.site/api/login/oauth2/code/google"
  AI_FASTAPI_BASE_URL: "http://ai-service"
