spring.application.name=uni-place-backend
server.port=8080

# =========================================================
#  Encoding 설정 (한글 깨짐 방지)
# =========================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# =========================================================
#  MySQL Database 연결 설정
# =========================================================
spring.datasource.url=jdbc:mysql://localhost:3306/uniplace?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ❗ 팀 레포에는 개인 계정/비번 올리지 말고 placeholder 유지 추천
# 로컬 개발은 application-local.properties 또는 환경변수로 오버라이드
spring.datasource.username=your_mysql_username
spring.datasource.password=your_mysql_password

# =========================================================
#  JPA / Hibernate 설정
# =========================================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ddl 자동 생성 방지 (팀 프로젝트 필수)
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.generate-ddl=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.id.new_generator_mappings=false

# =========================================================
#  File Upload 설정
# =========================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload-dir=C:/upload_files

# =========================================================
#  로그 설정
# =========================================================
logging.level.root=info
logging.level.org.hibernate=info
# 필요 시 로컬에서만 debug/trace로 올리기 권장
# logging.level.org.hibernate.SQL=debug
# logging.level.org.hibernate.type.descriptor.sql=trace

# =========================================================
#  JWT 설정
# =========================================================
# 반드시 32자 이상
jwt.secret=ThisIsVeryLongAndSecureJwtSecretKey_AtLeast_32_Bytes
jwt.access-exp=1800000
jwt.refresh-exp=86400000

# =========================================================
#  JSON 직렬화 설정
# =========================================================
spring.jackson.serialization.fail-on-empty-beans=false

# =========================================================
#  Static Resource 설정
# =========================================================
spring.web.resources.static-locations=classpath:/static/,classpath:/resources/,classpath:/META-INF/resources/
