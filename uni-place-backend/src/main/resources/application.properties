spring.application.name=uni-place-backend
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api}
server.forward-headers-strategy=framework
spring.config.import=optional:file:${APP_ENV_FILE:.env}[.properties]


# =========================================================
#  Encoding 설정 (한글 깨짐 방지)
# =========================================================

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# =========================================================
#  MySQL Database 연결 설정
# =========================================================

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:student123}
spring.datasource.password=${DB_PASSWORD:student123}


# =========================================================
#  JPA / Hibernate 설정
# =========================================================

# 실행되는 SQL 콘솔 출력
spring.jpa.show-sql=false

# SQL 보기 좋게 포맷팅
spring.jpa.properties.hibernate.format_sql=true

# DB 종류 지정
spring.jpa.database=mysql

# MySQL8 dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ddl 자동 생성 방지 (팀 프로젝트 필수)
spring.jpa.hibernate.ddl-auto=validate

# 초기화 순서 문제 방지
spring.jpa.defer-datasource-initialization=false

# ID 생성 전략 호환성
spring.jpa.properties.hibernate.id.new_generator_mappings=false


# =========================================================
#  File Upload 설정
# =========================================================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB

server.tomcat.max-http-form-post-size=-1  
server.tomcat.max-swallow-size=-1          

# 업로드 폴더 경로 (본인 환경에 맞게 수정)
app.upload-dir=${APP_UPLOAD_DIR:C:/upload_files}


# PDF 템플릿 파일 경로 (서버에 배포된 경로)
contract.template-path=${CONTRACT_TEMPLATE_PATH:}

# Python 실행 경로 (가상환경 사용 시 전체 경로 지정)
contract.python-path=python

# generate_contract.py 스크립트 경로
contract.script-path=${CONTRACT_SCRIPT_PATH:}

# 임시 이미지 생성 디렉토리
contract.temp-dir=${CONTRACT_TEMP_DIR:/tmp/contracts}

# =========================================================
#  로그 설정
# =========================================================

logging.level.root=info
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql=warn


# =========================================================
#  JWT 설정
# =========================================================

# 반드시 32자 이상
jwt.secret=${JWT_SECRET:CHANGE_ME_TO_A_SECURE_SECRET_AT_LEAST_32_BYTES_LONG}


# Access Token (30분)
jwt.access-exp=${JWT_ACCESS_EXP:86400000}

# Refresh Token (1일)
jwt.refresh-exp=${JWT_REFRESH_EXP:86400000}


# =========================================================
#  JSON 직렬화 설정
# =========================================================

spring.jackson.serialization.fail-on-empty-beans=false


# =========================================================
#  Static Resource 설정
# =========================================================

spring.web.resources.static-locations=classpath:/static/,classpath:/resources/,classpath:/META-INF/resources/
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:}

# =========================================================
#  OAuth2 Login 설정
# =========================================================

# -------------------------
# Kakao
# -------------------------
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:local-kakao-client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:local-kakao-client-secret}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=${KAKAO_REDIRECT_URI:{baseUrl}/login/oauth2/code/kakao}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id


# -------------------------
# Google
# -------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/google}

# filePath 설정
file.upload-path=${FILE_UPLOAD_PATH:C:/uniplace/uploads}


# =========================================================
#  Payment Gateway
# =========================================================

# =========================================================
#  Payment Gateway (KAKAO PAY)
# =========================================================
# 카카오페이 Open API 호스트(온라인 결제)
payment.kakao.base_url=${PAYMENT_KAKAO_BASE_URL:https://open-api.kakaopay.com}
payment.kakao.secret_key=${PAYMENT_KAKAO_SECRET_KEY:}
payment.kakao.cid=${PAYMENT_KAKAO_CID:TC0ONETIME}
payment.kakao.cid_secret=${PAYMENT_KAKAO_CID_SECRET:}
payment.kakao.webhook_admin_key=${PAYMENT_KAKAO_WEBHOOK_ADMIN_KEY:}

# =========================================================
#  Payment Gateway (NAVER PAY)
# =========================================================
payment.naver.api_base_url=${PAYMENT_NAVER_API_BASE_URL:https://dev-pay.paygate.naver.com}
payment.naver.service_base_url=${PAYMENT_NAVER_SERVICE_BASE_URL:https://test-m.pay.naver.com}
payment.naver.api_version=${PAYMENT_NAVER_API_VERSION:v2}
payment.naver.partner_id=${PAYMENT_NAVER_PARTNER_ID:naverpay-partner}
payment.naver.client_id=${PAYMENT_NAVER_CLIENT_ID:}
payment.naver.client_secret=${PAYMENT_NAVER_CLIENT_SECRET:}
payment.naver.chain_id=${PAYMENT_NAVER_CHAIN_ID:}


# =========================================================
#  Payment Gateway (TOSS)
# =========================================================
payment.toss.api_base_url=${PAYMENT_TOSS_API_BASE_URL:https://api.tosspayments.com}
payment.toss.api_key=${PAYMENT_TOSS_API_KEY:}
payment.toss.secret_key=${PAYMENT_TOSS_SECRET_KEY:}
payment.toss.api_version=${PAYMENT_TOSS_API_VERSION:2024-06-01}
payment.toss.webhook_secret=${PAYMENT_TOSS_WEBHOOK_SECRET:}
payment.toss.webhook.allow-unsigned=${PAYMENT_TOSS_WEBHOOK_ALLOW_UNSIGNED:false}

# =========================================================
#  Mail (Gmail SMTP) 설정
# =========================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true


#spring.mail.host=smtp.naver.com
#spring.mail.port=587
#spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
#spring.mail.password=${MAIL_PASSWORD:your-app-password}
#
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true
#spring.mail.properties.mail.smtp.starttls.required=true



# 프론트엔드 URL (재설정 링크 생성에 사용)
app.baseUrl=${APP_BASE_URL:}
app.frontend-url=${FRONTEND_URL:}

# **③ `.env`에 실제 URL 추가**
slack.webhook-url=${SLACK_WEBHOOK_URL:}

# Set Hibernate SQL logging to OFF or ERROR
log4j.logger.org.hibernate.SQL=OFF
log4j.logger.org.hibernate.type.descriptor.sql=OFF


logging.level.org.myweb.uniplace.domain.ai=DEBUG
logging.level.org.springframework.web.client=DEBUG

# =========================================================
#  Face Login (AES-256 암호화 키 — 반드시 .env로 주입)
# =========================================================
face.aes-key=${FACE_AES_KEY:UniPlaceFaceKey!!UniPlaceFaceKey!!}
ai.fastapi.base-url=${AI_FASTAPI_BASE_URL:}
ai.internal.token=${AI_INTERNAL_TOKEN:}
ai.fastapi.execute-path=${AI_FASTAPI_EXECUTE_PATH:/api/v1/ai/execute}
ai.fastapi.general-qa-path=${AI_FASTAPI_GENERAL_QA_PATH:/api/v1/ai/chat/general-qa}
ai.fastapi.ai-agent-chatbot-path=${AI_FASTAPI_AI_AGENT_CHATBOT_PATH:/api/v1/ai/chat/agent-chatbot}
ai.fastapi.voice-chatbot-path=${AI_FASTAPI_VOICE_CHATBOT_PATH:/api/v1/ai/chat/voice-assistant}
ai.fastapi.ai-agent-rag-search-path=${AI_FASTAPI_AI_AGENT_RAG_SEARCH_PATH:/api/v1/ai/search/rag}
ai.fastapi.community-content-search-path=${AI_FASTAPI_COMMUNITY_CONTENT_SEARCH_PATH:/api/v1/ai/community/content-search}
ai.fastapi.community-content-moderation-path=${AI_FASTAPI_COMMUNITY_CONTENT_MODERATION_PATH:/api/v1/ai/community/content-moderation}
ai.fastapi.contract-renewal-recommend-path=${AI_FASTAPI_CONTRACT_RENEWAL_RECOMMEND_PATH:/api/v1/ai/contracts/renewal-recommendations}
ai.fastapi.contract-anomaly-detection-path=${AI_FASTAPI_CONTRACT_ANOMALY_DETECTION_PATH:/api/v1/ai/contracts/anomaly-detections}
ai.fastapi.room-availability-search-path=${AI_FASTAPI_ROOM_AVAILABILITY_SEARCH_PATH:/api/v1/ai/rooms/availability-searches}
ai.fastapi.common-space-recommend-path=${AI_FASTAPI_COMMON_SPACE_RECOMMEND_PATH:/api/v1/ai/common-spaces/recommendations}
ai.fastapi.payment-summary-document-path=${AI_FASTAPI_PAYMENT_SUMMARY_DOCUMENT_PATH:/api/v1/ai/payments/summary-documents}
ai.fastapi.payment-status-summary-path=${AI_FASTAPI_PAYMENT_STATUS_SUMMARY_PATH:/api/v1/ai/payments/status-summaries}
ai.fastapi.payment-order-suggestion-path=${AI_FASTAPI_PAYMENT_ORDER_SUGGESTION_PATH:/api/v1/ai/payments/order-suggestions}
ai.fastapi.roomservice-stock-monitor-path=${AI_FASTAPI_ROOMSERVICE_STOCK_MONITOR_PATH:/api/v1/ai/operations/roomservice-stock-monitoring}
ai.fastapi.complain-priority-classify-path=${AI_FASTAPI_COMPLAIN_PRIORITY_CLASSIFY_PATH:/api/v1/ai/operations/complaint-priority-classification}
ai.fastapi.contract-version=${AI_FASTAPI_CONTRACT_VERSION:2026-03-08.3}
ai.fastapi.connect-timeout-millis=${AI_FASTAPI_CONNECT_TIMEOUT_MILLIS:3000}
ai.fastapi.read-timeout-seconds=${AI_FASTAPI_READ_TIMEOUT_SECONDS:30}\





# =========================================================
#  DB Migration MySQL Flyway - default = V2
# =========================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2
spring.flyway.baseline-description=V1,V2 already applied manually
