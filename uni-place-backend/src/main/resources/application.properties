
spring.application.name=uni-place-backend
server.port=8080


# =========================================================
#  Encoding 설정 (한글 깨짐 방지)
# =========================================================

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# =========================================================
#  MySQL Database 연결 설정
# =========================================================

#spring.datasource.url=jdbc:mysql://localhost:3306/uniplace?serverTimezone=Asia/Seoul&characterEncoding=UTF-
spring.datasource.url=jdbc:mysql://localhost:3306/student123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=student123
spring.datasource.password=student123


# =========================================================
#  JPA / Hibernate 설정
# =========================================================

# 실행되는 SQL 콘솔 출력
spring.jpa.show-sql=true

# SQL 보기 좋게 포맷팅
spring.jpa.properties.hibernate.format_sql=true

# DB 종류 지정
spring.jpa.database=mysql

# MySQL8 dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ddl 자동 생성 방지 (팀 프로젝트 필수)
spring.jpa.hibernate.ddl-auto=validate

# 초기화 순서 문제 방지
spring.jpa.defer-datasource-initialization=true

# ID 생성 전략 호환성
spring.jpa.properties.hibernate.id.new_generator_mappings=false


# =========================================================
#  File Upload 설정
# =========================================================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 업로드 폴더 경로 (본인 환경에 맞게 수정)
app.upload-dir=C:/upload_files


# =========================================================
#  로그 설정
# =========================================================

logging.level.root=info
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql=trace


# =========================================================
#  JWT 설정
# =========================================================

# 반드시 32자 이상
jwt.secret=A17YpP3qK8mdE6fG8jK1mN3pR5tY7uI9oP2aS4dF6gH8jKW2tR7nX1cL5aH0sQ4

# Access Token (30분)
jwt.access-exp=1800000

# Refresh Token (1일)
jwt.refresh-exp=86400000


# =========================================================
#  JSON 직렬화 설정
# =========================================================

spring.jackson.serialization.fail-on-empty-beans=false


# =========================================================
#  Static Resource 설정
# =========================================================

spring.web.resources.static-locations=classpath:/static/,classpath:/resources/,classpath:/META-INF/resources/

# =========================================================
#  OAuth2 Login 설정
# =========================================================

# -------------------------
# Kakao
# -------------------------
spring.security.oauth2.client.registration.kakao.client-id=KAKAO_CLIENT_ID
spring.security.oauth2.client.registration.kakao.client-secret=KAKAO_CLIENT_SECRET
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id


# -------------------------
# Google
# -------------------------
spring.security.oauth2.client.registration.google.client-id=GOOGLE_CLIENT_ID ddddddddd
spring.security.oauth2.client.registration.google.client-secret=GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# filePath 설정
file.upload-path=C:/uniplace/uploads


# =========================================================
#  Payment Gateway
# =========================================================

