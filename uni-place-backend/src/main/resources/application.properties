
spring.application.name=uni-place-backend
server.port=${SERVER_PORT:8080}
spring.config.import=optional:file:.env[.properties]


# =========================================================
#  Encoding 설정 (한글 깨짐 방지)
# =========================================================

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# =========================================================
#  MySQL Database 연결 설정
# =========================================================

#spring.datasource.url=jdbc:mysql://localhost:3306/uniplace?serverTimezone=Asia/Seoul&characterEncoding=UTF-
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/student123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:student123}
spring.datasource.password=${DB_PASSWORD:student123}


# =========================================================
#  JPA / Hibernate 설정
# =========================================================

# 실행되는 SQL 콘솔 출력
spring.jpa.show-sql=false

# SQL 보기 좋게 포맷팅
spring.jpa.properties.hibernate.format_sql=true

# DB 종류 지정
spring.jpa.database=mysql

# MySQL8 dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ddl 자동 생성 방지 (팀 프로젝트 필수)
spring.jpa.hibernate.ddl-auto=validate

# 초기화 순서 문제 방지
spring.jpa.defer-datasource-initialization=true

# ID 생성 전략 호환성
spring.jpa.properties.hibernate.id.new_generator_mappings=false


# =========================================================
#  File Upload 설정
# =========================================================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 업로드 폴더 경로 (본인 환경에 맞게 수정)
app.upload-dir=${APP_UPLOAD_DIR:C:/upload_files}


# PDF 템플릿 파일 경로 (서버에 배포된 경로)
contract.template-path=C:/uniplace/scripts/contract_template.png

# Python 실행 경로 (가상환경 사용 시 전체 경로 지정)
contract.python-path=python

# generate_contract.py 스크립트 경로
contract.script-path=C:/uniplace/scripts/generate_contract.py

# 임시 이미지 생성 디렉토리
contract.temp-dir=C:/uniplace/Contracts

# =========================================================
#  로그 설정
# =========================================================

logging.level.root=info
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql=warn


# =========================================================
#  JWT 설정
# =========================================================

# 반드시 32자 이상
jwt.secret=${JWT_SECRET:CHANGE_ME_TO_A_SECURE_SECRET_AT_LEAST_32_BYTES_LONG}


# Access Token (30분)
jwt.access-exp=${JWT_ACCESS_EXP:86400000}

# Refresh Token (1일)
jwt.refresh-exp=${JWT_REFRESH_EXP:86400000}


# =========================================================
#  JSON 직렬화 설정
# =========================================================

spring.jackson.serialization.fail-on-empty-beans=false


# =========================================================
#  Static Resource 설정
# =========================================================

spring.web.resources.static-locations=classpath:/static/,classpath:/resources/,classpath:/META-INF/resources/
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/success}

# =========================================================
#  OAuth2 Login 설정
# =========================================================

# -------------------------
# Kakao
# -------------------------
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:local-kakao-client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:local-kakao-client-secret}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id


# -------------------------
# Google
# -------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# filePath 설정
file.upload-path=${FILE_UPLOAD_PATH:C:/uniplace/uploads}


