name: frontend-docker

on:
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/frontend-docker.yml"
      - "uni-place-frontend/**"
  workflow_dispatch:

jobs:
  buildAndPush:
    name: Build and Push Frontend Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: echo "OWNER_LC=${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./uni-place-frontend
          file: ./uni-place-frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/uniplace-frontend:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/uniplace-frontend:latest
