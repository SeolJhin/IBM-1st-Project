name: uni-place-backend-deploy

on:
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/**"
      - "uni-place-backend/src/**"
      - "uni-place-backend/build.gradle"
      - "uni-place-backend/settings.gradle"
      - "uni-place-backend/gradle/**"
      - "uni-place-backend/Dockerfile"
  workflow_dispatch:

jobs:
  aiSmokeGate:
    name: AI REST Smoke Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install smoke dependencies
        working-directory: ./AI
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.116.1 uvicorn[standard]==0.35.0 pydantic==2.11.7 pydantic-settings==2.10.1 httpx==0.28.1

      - name: Run AI smoke tests
        working-directory: ./AI
        env:
          PYTHONUTF8: "1"
        run: python -m unittest discover -s tests -p "test_ai_rest_smoke.py" -v

  makeTagAndRelease:
    runs-on: ubuntu-latest
    needs: aiSmokeGate
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.create_tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Tag
        id: create_tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.create_tag.outputs.new_tag }}
          release_name: Release ${{ steps.create_tag.outputs.new_tag }}
          body: ${{ steps.create_tag.outputs.changelog }}
          draft: false
          prerelease: false

  buildImageAndPush:
    name: Build and Push Docker Image
    needs: makeTagAndRelease
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: echo "OWNER_LC=${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and Push
        uses: docker/build-push-action@v3
        with:
          context: ./uni-place-backend
          file: ./uni-place-backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/deploy:${{ needs.makeTagAndRelease.outputs.tag_name }}
            ghcr.io/${{ env.OWNER_LC }}/deploy:latest
