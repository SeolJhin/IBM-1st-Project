name: ai-docker

on:
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/ai-docker.yml"
      - "AI/**"
  workflow_dispatch:

jobs:

  aiSmokeGate:
    name: AI REST Smoke Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install smoke dependencies
        working-directory: ./AI
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI smoke tests
        continue-on-error: true
        working-directory: ./AI
        env:
          PYTHONUTF8: "1"
        run: python -m unittest discover -s tests -p "test_ai_rest_smoke.py" -v

  buildAndPush:
    name: Build and Push AI Docker Image
    needs: aiSmokeGate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./AI
          file: ./AI/Dockerfile
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/uniplace-ai:${{ github.sha }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/uniplace-ai:latest
