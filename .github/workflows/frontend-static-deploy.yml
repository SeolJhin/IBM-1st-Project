name: frontend-static-deploy

on:
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/frontend-static-deploy.yml"
      - "uni-place-frontend/**"
  workflow_dispatch:

concurrency:
  group: frontend-static-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Frontend To S3
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ap-northeast-2
      FRONTEND_S3_BUCKET: uniplace-front-194722402714-ap-northeast-2-an
      FRONTEND_CLOUDFRONT_DISTRIBUTION_ID: E28HT3NFNRO4V1
    steps:
      - uses: actions/checkout@v4

      - name: Load frontend aws.env
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ "$line" =~ ^[[:space:]]*# ]] || [[ -z "${line// /}" ]]; then
              continue
            fi
            key="${line%%=*}"
            value="${line#*=}"
            key="$(echo "$key" | xargs)"
            value="$(echo "$value" | sed -e 's/\r$//')"
            if [[ -n "$key" ]]; then
              echo "${key}=${value}" >> "$GITHUB_ENV"
            fi
          done < ./uni-place-frontend/aws.env

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: uni-place-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./uni-place-frontend
        run: npm ci

      - name: Lint
        working-directory: ./uni-place-frontend
        run: npm run lint

      - name: Build
        working-directory: ./uni-place-frontend
        run: npm run build

      - name: Generate app-config.js
        run: |
          cat > ./uni-place-frontend/dist/app-config.js <<EOF
          window.__APP_CONFIG__ = {
            BACKEND_BASE_URL: '${REACT_APP_BACKEND_BASE_URL:-/api}',
            KAKAO_MAP_KEY: '${VITE_KAKAO_MAP_KEY:-}',
            KMA_KEY: '${VITE_KMA_KEY:-}',
            GEMINI_API_KEY: '${REACT_APP_GEMINI_API_KEY:-}',
          };
          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Static Assets (Immutable Cache)
        run: |
          aws s3 sync ./uni-place-frontend/dist s3://${FRONTEND_S3_BUCKET} \
            --delete \
            --exclude "index.html" \
            --exclude "app-config.js" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html (No Cache)
        run: |
          aws s3 cp ./uni-place-frontend/dist/index.html s3://${FRONTEND_S3_BUCKET}/index.html \
            --cache-control "no-cache,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Upload app-config.js (No Cache)
        run: |
          aws s3 cp ./uni-place-frontend/dist/app-config.js s3://${FRONTEND_S3_BUCKET}/app-config.js \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "application/javascript; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${FRONTEND_CLOUDFRONT_DISTRIBUTION_ID} \
            --paths "/" "/index.html" "/app-config.js"
